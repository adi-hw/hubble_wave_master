# HubbleWave Customer Instance Provisioning
# Triggered by Control Plane or manually to provision new customer instances

name: Provision Customer Instance

on:
  workflow_dispatch:
    inputs:
      customer_code:
        description: 'Customer code (e.g., acme-corp)'
        required: true
        type: string
      instance_id:
        description: 'Instance UUID'
        required: true
        type: string
      resource_tier:
        description: 'Resource tier'
        required: true
        type: choice
        options:
          - standard
          - premium
          - enterprise
        default: standard
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - staging
          - production
        default: staging

  repository_dispatch:
    types: [provision-instance]

permissions:
  contents: read

jobs:
  validate:
    name: Validate Input
    runs-on: ubuntu-latest
    outputs:
      customer_code: ${{ steps.validate.outputs.customer_code }}
      instance_id: ${{ steps.validate.outputs.instance_id }}
      resource_tier: ${{ steps.validate.outputs.resource_tier }}
      environment: ${{ steps.validate.outputs.environment }}
    steps:
      - name: Validate inputs
        id: validate
        env:
          RAW_CUSTOMER_CODE: ${{ github.event.inputs.customer_code || github.event.client_payload.customer_code }}
          RAW_INSTANCE_ID: ${{ github.event.inputs.instance_id || github.event.client_payload.instance_id }}
          RAW_RESOURCE_TIER: ${{ github.event.inputs.resource_tier || github.event.client_payload.resource_tier || 'standard' }}
          RAW_ENVIRONMENT: ${{ github.event.inputs.environment || github.event.client_payload.environment || 'staging' }}
        run: |
          set -euo pipefail

          # customer_code: lowercase letter start, lowercase alphanumeric + hyphen, 3-31 chars total
          if ! [[ "$RAW_CUSTOMER_CODE" =~ ^[a-z][a-z0-9-]{2,30}$ ]]; then
            echo "::error::Invalid customer_code. Expected ^[a-z][a-z0-9-]{2,30}$"
            exit 1
          fi

          # instance_id: UUID v4 (version nibble = 4, variant nibble in 8/9/a/b)
          if ! [[ "$RAW_INSTANCE_ID" =~ ^[0-9a-f]{8}-[0-9a-f]{4}-4[0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$ ]]; then
            echo "::error::Invalid instance_id. Expected UUID v4."
            exit 1
          fi

          # resource_tier allowlist
          case "$RAW_RESOURCE_TIER" in
            standard|premium|enterprise) ;;
            *)
              echo "::error::Invalid resource_tier '$RAW_RESOURCE_TIER'. Allowed: standard, premium, enterprise."
              exit 1
              ;;
          esac

          # environment allowlist
          case "$RAW_ENVIRONMENT" in
            staging|production) ;;
            *)
              echo "::error::Invalid environment '$RAW_ENVIRONMENT'. Allowed: staging, production."
              exit 1
              ;;
          esac

          echo "customer_code=$RAW_CUSTOMER_CODE" >> "$GITHUB_OUTPUT"
          echo "instance_id=$RAW_INSTANCE_ID" >> "$GITHUB_OUTPUT"
          echo "resource_tier=$RAW_RESOURCE_TIER" >> "$GITHUB_OUTPUT"
          echo "environment=$RAW_ENVIRONMENT" >> "$GITHUB_OUTPUT"

  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: validate
    environment: ${{ needs.validate.outputs.environment }}
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.0

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Terraform Init
        working-directory: infrastructure/terraform/modules/customer-instance
        env:
          TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          INSTANCE_ID: ${{ needs.validate.outputs.instance_id }}
        run: |
          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=instances/${INSTANCE_ID}/terraform.tfstate" \
            -backend-config="region=${AWS_REGION}"

      - name: Terraform Plan
        working-directory: infrastructure/terraform/modules/customer-instance
        env:
          TF_VAR_instance_id: ${{ needs.validate.outputs.instance_id }}
          TF_VAR_customer_code: ${{ needs.validate.outputs.customer_code }}
          TF_VAR_environment: ${{ needs.validate.outputs.environment }}
          TF_VAR_resource_tier: ${{ needs.validate.outputs.resource_tier }}
          TF_VAR_db_host: ${{ secrets.DB_HOST }}
          TF_VAR_redis_host: ${{ secrets.REDIS_HOST }}
        run: terraform plan -out=tfplan

      - name: Upload plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: infrastructure/terraform/modules/customer-instance/tfplan

  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: [validate, terraform-plan]
    environment: ${{ needs.validate.outputs.environment }}
    permissions:
      contents: read
      id-token: write
    outputs:
      namespace: ${{ steps.tf-outputs.outputs.namespace }}
      database_name: ${{ steps.tf-outputs.outputs.database_name }}
      s3_bucket: ${{ steps.tf-outputs.outputs.s3_bucket }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.0

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Download plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: infrastructure/terraform/modules/customer-instance

      - name: Terraform Init
        working-directory: infrastructure/terraform/modules/customer-instance
        env:
          TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          INSTANCE_ID: ${{ needs.validate.outputs.instance_id }}
        run: |
          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=instances/${INSTANCE_ID}/terraform.tfstate" \
            -backend-config="region=${AWS_REGION}"

      - name: Terraform Apply
        working-directory: infrastructure/terraform/modules/customer-instance
        run: terraform apply tfplan

      - name: Get Terraform outputs
        id: tf-outputs
        working-directory: infrastructure/terraform/modules/customer-instance
        run: |
          echo "namespace=$(terraform output -raw namespace)" >> "$GITHUB_OUTPUT"
          echo "database_name=$(terraform output -raw database_name)" >> "$GITHUB_OUTPUT"
          echo "s3_bucket=$(terraform output -raw s3_bucket_name)" >> "$GITHUB_OUTPUT"

  run-migrations:
    name: Run Instance Migrations
    runs-on: ubuntu-latest
    needs: [validate, terraform-apply]
    environment: ${{ needs.validate.outputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run instance migrations
        run: npm run migration:run:instance
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ needs.terraform-apply.outputs.database_name }}

  deploy-services:
    name: Deploy Instance Services
    runs-on: ubuntu-latest
    needs: [validate, terraform-apply, run-migrations]
    environment: ${{ needs.validate.outputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.28.0'

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: 'v3.13.0'

      - name: Configure Kubernetes context
        uses: azure/k8s-set-context@v4
        with:
          kubeconfig: ${{ secrets.KUBE_CONFIG }}

      - name: Deploy instance services
        env:
          CUSTOMER_CODE: ${{ needs.validate.outputs.customer_code }}
          INSTANCE_ID: ${{ needs.validate.outputs.instance_id }}
          RESOURCE_TIER: ${{ needs.validate.outputs.resource_tier }}
          ENVIRONMENT: ${{ needs.validate.outputs.environment }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_NAME: ${{ needs.terraform-apply.outputs.database_name }}
          REDIS_HOST: ${{ secrets.REDIS_HOST }}
        run: |
          NAMESPACE="hw-${CUSTOMER_CODE}"

          helm upgrade --install hubblewave-instance \
            ./infrastructure/helm/instance-services \
            --namespace "$NAMESPACE" \
            --set instanceId="$INSTANCE_ID" \
            --set customerCode="$CUSTOMER_CODE" \
            --set resourceTier="$RESOURCE_TIER" \
            --set environment="$ENVIRONMENT" \
            --set-string database.host="$DB_HOST" \
            --set-string database.name="$DB_NAME" \
            --set-string redis.host="$REDIS_HOST" \
            --values "./infrastructure/helm/instance-services/values-${ENVIRONMENT}.yaml" \
            --wait --timeout 10m

  notify-control-plane:
    name: Notify Control Plane
    runs-on: ubuntu-latest
    needs: [validate, deploy-services]
    environment: ${{ needs.validate.outputs.environment }}
    steps:
      - name: Update instance status in Control Plane
        env:
          CONTROL_PLANE_API_KEY: ${{ secrets.CONTROL_PLANE_API_KEY }}
          CONTROL_PLANE_URL: ${{ secrets.CONTROL_PLANE_URL }}
          INSTANCE_ID: ${{ needs.validate.outputs.instance_id }}
        run: |
          PROVISIONED_AT="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          curl -X POST \
            -H "Authorization: Bearer ${CONTROL_PLANE_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "{\"instanceId\":\"${INSTANCE_ID}\",\"status\":\"active\",\"provisionedAt\":\"${PROVISIONED_AT}\"}" \
            "${CONTROL_PLANE_URL}/api/internal/instances/status"

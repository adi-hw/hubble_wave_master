# HubbleWave Platform CI Pipeline
# Runs on all PRs and pushes to master/main/develop branches.
#
# Architectural-gate jobs enforce canon §21 ("Builds fail if violations
# exist"). The `scanners` job runs the six scripts that exit non-zero on
# canon violations: authz, audit, security, compliance, service-boundary,
# and approved-deps. New scanners added in future remediation waves MUST
# be appended to that job. See docs/ci.md for the full list of required
# status checks and how to extend them.

name: CI

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main, develop]

permissions:
  contents: read

env:
  NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_ACCESS_TOKEN }}
  NODE_VERSION: '20.x'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # Lint and format check
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Derive appropriate SHAs for NX
        uses: nrwl/nx-set-shas@3e9ad7370203c1e93d109be57f3b72eb0eb511b1 # v4

      - name: Run lint
        run: npx nx affected --target=lint --parallel=3

      - name: Check formatting
        run: npx nx format:check

  # Architectural CI gates — canon §21 enforcement.
  #
  # Each step is a script that exits non-zero on violation. They are
  # grouped into one job (rather than separate jobs) because they share
  # the same `npm ci` install and run quickly; failing fast on the first
  # violation is preferable to paying six install costs in parallel.
  # If a future scanner becomes long-running, split it into its own job.
  scanners:
    name: Architectural CI gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Authorization bypass check (canon §9 / W1.2)
        run: npm run authz:check

      - name: Audit-in-transaction check (canon §10 / W1.6)
        run: npm run audit:check

      - name: Security bypass check
        run: npm run security:check

      - name: Canon terminology compliance check
        run: npm run compliance:check:strict

      - name: Service boundary check (canon §3 / W5.D)
        run: npm run service-boundary:check

      - name: Approved-dependencies check (W6.D)
        run: npm run deps:check

      - name: CI/CD wiring check (F106 / W0 task 7)
        run: npm run cicd:check

      - name: Dead-code anti-resurrection check (W0 task 10 / Deletion Catalog §D.6)
        run: npm run dead-code:check

      - name: Migration blocking-index check (F046 / W6.A)
        run: npm run migrations:check

      - name: Silent-skip check (canon §10 amendment / W5.G)
        run: npm run silent-skip:check

      - name: Service-token default-deny check (canon §29.7 / W2 Stream 1 PR4)
        run: npm run service-token:check

      - name: No-HS256 signing check (canon §29.9 / W2 Stream 1 PR4)
        run: npm run no-hs256:check

      - name: Scanner self-tests (W0 task 2 + per-scanner suites)
        # Each scanner ships with a self-test that proves it catches the
        # patterns it claims to. Without this gate, future scanner edits
        # could silently regress detection (cf. F151 — broken
        # compliance:check went unnoticed for some unknown duration).
        # Each scanner ships a self-test that proves it catches the
        # patterns it claims to. Without this gate, future scanner edits
        # could silently regress detection (cf. F151 — broken
        # compliance:check went unnoticed for some unknown duration).
        # W2 Stream 1 PR4 adds service-token + no-hs256 (canon §29.7 + §29.9).
        run: npm run selftest:scanners

      # Phase 3 Prelude scanners (canon §21 / Stream 4).
      # entity-schema, cross-domain, migration-filename, abac-coverage all
      # fail CI on violation. permissions-coverage is report-only (exits 0
      # with a coverage report; the output is informational for the rollout
      # dashboard, not a hard gate).
      - name: Entity-schema ownership check (Phase 3 Prelude)
        run: npm run entity-schema:check

      - name: Cross-domain import check (Phase 3 Prelude)
        run: npm run cross-domain:check

      - name: Migration filename check (Phase 3 Prelude)
        run: npm run migration-filename:check

      - name: Permissions annotation coverage (Phase 3 Prelude — report only)
        run: npm run permissions-coverage:check

      - name: ABAC coverage check (Phase 3 Prelude)
        run: npm run abac-coverage:check

      - name: Scanner self-tests — Phase 3 Prelude scanners
        # Self-tests prove each Prelude scanner catches its claimed patterns.
        # Consistent with the W0 scanner self-test discipline: every scanner
        # ships its own self-test so detection regressions fail CI immediately.
        run: |
          npx tsx tools/scanners/entity-schema-ownership-check-selftest.ts
          npx tsx tools/scanners/cross-domain-import-check-selftest.ts
          npx tsx tools/scanners/migration-filename-check-selftest.ts
          npx tsx tools/scanners/permissions-annotation-coverage-selftest.ts
          npx tsx tools/scanners/abac-coverage-check-selftest.ts

  # SBOM generation and vulnerability scan (F119 / W0 task 9).
  #
  # Uploads a SPDX-format SBOM as a workflow artifact (consumed by
  # release packaging and the security review process) and fails CI if
  # grype finds any high-severity CVE in the dependency tree.
  sbom:
    name: SBOM and CVE scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate SBOM (syft)
        uses: anchore/sbom-action@e11c554f704a0b820cbf8c51673f6945e0731532 # v0.20.0
        with:
          path: '.'
          format: 'spdx-json'
          artifact-name: hubblewave-sbom.spdx.json
          output-file: hubblewave-sbom.spdx.json

      - name: Vulnerability scan (grype)
        uses: anchore/scan-action@2c901ab7378897c01b8efaa2d0c9bf519cc64b9e # v6.0.0
        with:
          sbom: hubblewave-sbom.spdx.json
          fail-build: true
          severity-cutoff: high

  # License audit gate (F119 / W0 task 9).
  #
  # Runs license-checker against production deps and validates each
  # package's license against tools/license-allowlist.json. Fails CI on
  # blocked licenses (GPL family by default) or unknown licenses
  # without an explicit exception.
  license-audit:
    name: License audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate licenses
        run: |
          mkdir -p tmp
          npm run license:check

  # Secret-scanning gate (F111 / F119 / W0 task 8).
  #
  # Runs gitleaks against the diff for PRs and against the full history
  # for push events. Fails CI on any finding outside the allowlist
  # configured in .gitleaks.toml.
  gitleaks:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml
          GITLEAKS_ENABLE_COMMENTS: false
          GITLEAKS_ENABLE_SUMMARY: true

  # Type checking
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Derive appropriate SHAs for NX
        uses: nrwl/nx-set-shas@3e9ad7370203c1e93d109be57f3b72eb0eb511b1 # v4

      - name: Run TypeScript type check
        run: npx nx affected --target=build --parallel=3

  # Unit tests
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: hubblewave
          POSTGRES_PASSWORD: hubblewave_ci_password
          POSTGRES_DB: hubblewave_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Derive appropriate SHAs for NX
        uses: nrwl/nx-set-shas@3e9ad7370203c1e93d109be57f3b72eb0eb511b1 # v4

      - name: Run unit tests
        run: npx nx affected --target=test --parallel=3 --coverage
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: hubblewave
          DB_PASSWORD: hubblewave_ci_password
          DB_NAME: hubblewave_test
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          JWT_SECRET: ci-test-jwt-secret
          JWT_EXPIRES_IN: 1h

      - name: Upload coverage reports
        uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238 # v4
        with:
          files: ./coverage/**/lcov.info
          fail_ci_if_error: false

  # E2E tests
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: hubblewave
          POSTGRES_PASSWORD: hubblewave_ci_password
          POSTGRES_DB: hubblewave_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Derive appropriate SHAs for NX
        uses: nrwl/nx-set-shas@3e9ad7370203c1e93d109be57f3b72eb0eb511b1 # v4

      - name: Build affected applications
        run: npx nx affected --target=build --parallel=3
        env:
          NODE_ENV: test

      - name: Run E2E tests
        run: npx nx affected --target=e2e --parallel=1
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: hubblewave
          DB_PASSWORD: hubblewave_ci_password
          DB_NAME: hubblewave_e2e
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          JWT_SECRET: ci-test-jwt-secret
          JWT_EXPIRES_IN: 1h

      - name: Upload E2E test artifacts
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: e2e-test-results
          path: |
            apps/*-e2e/test-results/
            apps/*-e2e/playwright-report/
          retention-days: 7

  # Security scanning
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=high

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@915b19bbe73b92a6cf82a1bc12b087c9a19a5fe2 # v0.28.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

  # Build check (ensures all apps build successfully)
  build:
    name: Build All
    runs-on: ubuntu-latest
    needs: [lint, typecheck, scanners]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Derive appropriate SHAs for NX
        uses: nrwl/nx-set-shas@3e9ad7370203c1e93d109be57f3b72eb0eb511b1 # v4

      - name: Build all affected projects
        run: npx nx affected --target=build --parallel=3

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  # Phase 3 Prelude — validation harness (canon §21 / Stream 4).
  #
  # Runs the end-to-end assertion harness that verifies the Prelude exit
  # criterion: "Fresh database boot produces only valid platform experiences
  # and a deterministic runtime baseline." Services are provisioned by the
  # GitHub Actions services block; --skip-rebuild tells the harness not to
  # call docker-compose (which would tear down those services).
  prelude-validate:
    name: Phase 3 Prelude — validation harness
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: hubblewave
          POSTGRES_PASSWORD: hubblewave
          POSTGRES_DB: hubblewave
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Initialize databases (run scripts/init-db/*.sql)
        # Docker compose runs these via docker-entrypoint-initdb.d, but the
        # GitHub Actions services: block does not honor that mount. Run the
        # same SQL manually so the hubblewave_control_plane DB + pgvector
        # extension + roles are all in place before migrations.
        run: |
          for f in scripts/init-db/*.sql; do
            echo "Applying $f..."
            PGPASSWORD=hubblewave psql -h localhost -U hubblewave -d postgres -f "$f"
          done

      - name: Run migrations + seed admin user
        run: |
          npm run migration:run:control-plane
          npm run migration:run:instance
          npx tsx scripts/seed-admin-user.ts
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: hubblewave
          DB_PASSWORD: hubblewave
          DB_NAME: hubblewave
          CONTROL_PLANE_DB_HOST: localhost
          CONTROL_PLANE_DB_PORT: 5432
          CONTROL_PLANE_DB_USER: hubblewave
          CONTROL_PLANE_DB_PASSWORD: hubblewave
          CONTROL_PLANE_DB_NAME: hubblewave_control_plane
          DIRECT_DB_HOST: localhost
          DIRECT_DB_PORT: 5432
          DIRECT_CONTROL_PLANE_DB_HOST: localhost
          DIRECT_CONTROL_PLANE_DB_PORT: 5432
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          NODE_ENV: development
          JWT_KEY_PROVIDER: local-es256
          JWT_BOOTSTRAP_SECRET: ci-bootstrap-secret-for-prelude-validate
          API_PORT: 3000
          ADMIN_EMAIL: admin@hubblewave.local
          ADMIN_PASSWORD: ci-admin-password-1234
          DEFAULT_ADMIN_PASSWORD: ci-admin-password-1234
          ADMIN_FIRST_NAME: HubbleWave
          ADMIN_LAST_NAME: Admin

      - name: Write .env for harness password lookup
        # Match the password used in the migration + seed step env block.
        # Must be ≥12 chars per the SeedAdminUser1818000000000 migration guard.
        run: echo "ADMIN_PASSWORD=ci-admin-password-1234" > .env

      - name: Prelude validate
        run: npm run prelude:validate -- --skip-rebuild
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: hubblewave
          DB_PASSWORD: hubblewave
          DB_NAME: hubblewave
          CONTROL_PLANE_DB_HOST: localhost
          CONTROL_PLANE_DB_PORT: 5432
          CONTROL_PLANE_DB_USER: hubblewave
          CONTROL_PLANE_DB_PASSWORD: hubblewave
          CONTROL_PLANE_DB_NAME: hubblewave_control_plane
          DIRECT_DB_HOST: localhost
          DIRECT_DB_PORT: 5432
          DIRECT_CONTROL_PLANE_DB_HOST: localhost
          DIRECT_CONTROL_PLANE_DB_PORT: 5432
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          NODE_ENV: development
          JWT_KEY_PROVIDER: local-es256
          JWT_BOOTSTRAP_SECRET: ci-bootstrap-secret-for-prelude-validate
          API_PORT: 3000
          ADMIN_EMAIL: admin@hubblewave.local
          ADMIN_PASSWORD: ci-admin-password-1234
          DEFAULT_ADMIN_PASSWORD: ci-admin-password-1234
          ADMIN_FIRST_NAME: HubbleWave
          ADMIN_LAST_NAME: Admin

{{- /*
The chart can either materialise a Secret from --set-string values (default for
CD's helm upgrade --install) or reference an existing one populated by an
external-secrets controller / SealedSecret. Production deployments should set
secrets.create=false and supply secrets.existingSecret instead.
*/ -}}
{{- if .Values.secrets.create -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "control-plane.secretName" . }}
  labels:
    {{- include "control-plane.labels" . | nindent 4 }}
type: Opaque
stringData:
  JWT_SECRET: {{ required "secrets.jwtSecret is required" .Values.secrets.jwtSecret | quote }}
  LICENSE_SIGNING_KEY: {{ required "secrets.licenseSigningKey is required" .Values.secrets.licenseSigningKey | quote }}
  DB_HOST: {{ .Values.secrets.database.host | quote }}
  DB_PORT: {{ .Values.secrets.database.port | quote }}
  DB_USER: {{ .Values.secrets.database.user | quote }}
  DB_PASSWORD: {{ .Values.secrets.database.password | quote }}
  DB_NAME: {{ .Values.secrets.database.name | quote }}
  REDIS_HOST: {{ .Values.secrets.redis.host | quote }}
  REDIS_PORT: {{ .Values.secrets.redis.port | quote }}
  REDIS_PASSWORD: {{ .Values.secrets.redis.password | quote }}
{{- end }}

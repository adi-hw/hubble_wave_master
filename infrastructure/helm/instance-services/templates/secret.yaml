{{- /*
Production deployments should set secrets.create=false and inject these values
through external-secrets / SealedSecret. The chart-managed Secret here exists
so a CD pipeline that passes --set-string fields can still bring up an instance.
*/ -}}
{{- if .Values.secrets.create -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "instance-services.secretName" . }}
  labels:
    {{- include "instance-services.labels" . | nindent 4 }}
type: Opaque
stringData:
  JWT_SECRET: {{ required "secrets.jwtSecret is required" .Values.secrets.jwtSecret | quote }}
  JWT_AUDIENCE: {{ .Values.secrets.jwtAudience | quote }}
  JWT_ISSUER: {{ .Values.secrets.jwtIssuer | quote }}
  DB_PASSWORD: {{ required "secrets.databasePassword is required" .Values.secrets.databasePassword | quote }}
  REDIS_AUTH_TOKEN: {{ .Values.secrets.redisAuthToken | quote }}
  BACKUP_SIGNING_KEY: {{ .Values.secrets.backupSigningKey | quote }}
  PACK_INSTALL_TOKEN: {{ .Values.secrets.packInstallToken | quote }}
  PACK_SIGNING_PUBLIC_KEY: {{ .Values.secrets.packSigningPublicKey | quote }}
  HUGGINGFACE_TOKEN: {{ .Values.secrets.huggingfaceToken | quote }}
{{- end }}

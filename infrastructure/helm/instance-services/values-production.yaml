# Production overrides for instance-services.

environment: production

config:
  NODE_ENV: production
  LOG_LEVEL: info

defaults:
  replicaCount: 2
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 8
    targetCPUUtilizationPercentage: 70

ingress:
  enabled: true
  host: ""
  tlsSecret: ""

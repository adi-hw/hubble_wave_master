# Default values for the HubbleWave instance-services chart.
# Each entry under `services` is rendered into a Deployment + Service pair.
# CD substitutes image.tag with the immutable commit SHA.

environment: production

# Per-instance identity. The provision-instance workflow passes these.
instanceId: ""
customerCode: ""
resourceTier: standard

nameOverride: ""
fullnameOverride: ""

image:
  registry: ghcr.io
  repository: hubblewave/hw-platform
  # tag is set by CD/provision pipeline. An empty tag fails the chart fast.
  tag: ""
  pullPolicy: IfNotPresent
  pullSecrets: []

serviceAccount:
  create: true
  name: instance-services-sa
  annotations: {}

# Non-secret runtime config shared by every service in the bundle.
config:
  NODE_ENV: production
  LOG_LEVEL: info
  DB_SSL: "true"

# Connection coordinates for the per-instance datastores. Hosts come from
# Terraform outputs; the password is supplied via the secret block below.
database:
  host: ""
  port: "5432"
  user: ""
  name: ""
redis:
  host: ""
  port: "6379"

# PgBouncer connection pooler (W6.C / F045).
# App pods connect to PgBouncer at port 6432; PgBouncer multiplexes into
# Postgres at database.host:database.port.
# Migration runner and LISTEN/NOTIFY consumers must use the direct Postgres
# coordinates (DIRECT_DB_HOST / DIRECT_DB_PORT) to bypass PgBouncer because
# transaction-pooling mode is incompatible with multi-statement DDL and
# server-side notifications.
pgbouncer:
  # edoburu/pgbouncer is a minimal, well-maintained Alpine-based image.
  image: "edoburu/pgbouncer:1.21.0"
  replicaCount: 1
  # Per-instance Postgres-side connections per pool. 25 server conns support
  # hundreds of concurrent client connections in transaction mode.
  defaultPoolSize: 25
  # Reserve slots so monitoring / admin connections are never starved.
  reservePoolSize: 5
  reservePoolTimeout: 5
  # Maximum simultaneous client connections (burst tolerance across all pods).
  maxClientConn: 1000
  # Idle server connections are closed after 10 minutes; reduces Postgres
  # backend count during off-peak.
  serverIdleTimeout: 600
  # Queued clients that cannot get a connection in 30s get an immediate error
  # rather than blocking indefinitely.
  queryWaitTimeout: 30
  resources:
    requests:
      cpu: 50m
      memory: 32Mi
    limits:
      cpu: 200m
      memory: 64Mi

# Per-instance secret values. Production should set secrets.create=false and
# point existingSecret at a Secret materialised by external-secrets.
secrets:
  create: true
  existingSecret: ""
  jwtSecret: ""
  jwtAudience: hubblewave-instance
  jwtIssuer: hubblewave-identity
  databasePassword: ""
  redisAuthToken: ""
  backupSigningKey: ""
  packInstallToken: ""
  packSigningPublicKey: ""
  huggingfaceToken: ""

# Pod-level security defaults applied to every service.
podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

# Default resources used when a service entry omits resources.
defaults:
  replicaCount: 2
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  service:
    type: ClusterIP
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 6
    targetCPUUtilizationPercentage: 70
  readinessProbePath: /api/health
  livenessProbePath: /api/health

# Services rendered by the chart. Each entry inherits `defaults` for any field
# it does not override.
#
# Post-ARC-W1-cutover topology: a single `api` deployment for the instance
# modular monolith (per canon §5/§17/§19 + spec §2), plus the web-client.
# All instance-plane modules (identity, metadata, data, automation, ava,
# views, notifications, instance-api, analytics) run inside the same Nest
# process.
services:
  - name: api
    image: api
    port: 3000
    servicePort: 80
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: 2000m
        memory: 2Gi
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 10
      targetCPUUtilizationPercentage: 70
  - name: web-client
    image: web-client
    port: 80
    servicePort: 80
    readinessProbePath: /health
    livenessProbePath: /health
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 128Mi

ingress:
  enabled: false
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
  host: ""
  tlsSecret: ""
  # Path-prefix routes that map onto the bundled services. /api/ routes to
  # the consolidated apps/api deployment; / routes to the web-client.
  routes:
    - path: /api
      pathType: Prefix
      service: api
      port: 80
    - path: /
      pathType: Prefix
      service: web-client
      port: 80

nodeSelector: {}
tolerations: []
affinity: {}
